name: Deploy to Aliyun OSS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy with rclone
        uses: wei/rclone@v1
        with:
          args: sync . oss:cross-border-nav --progress
        env:
          RCLONE_CONFIG_OSS_TYPE: s3
          RCLONE_CONFIG_OSS_PROVIDER: alibaba
          RCLONE_CONFIG_OSS_ACCESS_KEY_ID: ${{ secrets.ALI_OSS_ACCESS_KEY_ID }}
          RCLONE_CONFIG_OSS_SECRET_ACCESS_KEY: ${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }}
          RCLONE_CONFIG_OSS_ENDPOINT: oss-cn-hangzhou.aliyuncs.com
          RCLONE_CONFIG_OSS_BUCKET: cross-border-nav
