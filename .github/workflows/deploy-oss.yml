name: Deploy to Aliyun OSS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: fangbinwei/aliyun-oss-action@v1
        with:
          accessKeyId: ${{ secrets.ALI_OSS_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }}
          bucket: cross-border-nav
          region: oss-cn-hangzhou
          localPath: ./
          remotePath: /
          exclude: ".git/|.github/|*.md"
