name: 🚀 Deploy to Aliyun OSS + CDN

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and setup ossutil
        run: |
          curl -sSL http://gosspublic.alicdn.com/ossutil/install.sh | bash
          sudo mv ossutil64 /usr/local/bin/ossutil
          sudo chmod +x /usr/local/bin/ossutil

      - name: Configure ossutil
        run: |
          ossutil config -e oss-cn-hangzhou.aliyuncs.com \
                         -i ${{ secrets.ALI_OSS_ACCESS_KEY_ID }} \
                         -k ${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }} \
                         -c .ossutilconfig

      - name: Sync to OSS
        run: |
          ossutil cp -r --update --force ./ oss://cross-border-nav/ \
            --meta Cache-Control:no-cache,public \
            --exclude ".git/" --exclude ".github/" --exclude "*.md" --exclude "README.md"
