name: Deploy to Aliyun OSS
on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Sync to OSS
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装阿里云 ossutil
      - name: Install ossutil
        run: |
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil-v1.7.19-linux-amd64.zip
          unzip ossutil.zip
          sudo mv ossutil-v1.7.19-linux-amd64/ossutil64 /usr/local/bin/ossutil
          ossutil --version

      # 3. 配置 ossutil 鉴权
      - name: Configure ossutil
        run: |
          ossutil config \
            -i "${{ secrets.ALI_OSS_ACCESS_KEY_ID }}" \
            -k "${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }}" \
            -e "oss-cn-hangzhou.aliyuncs.com"

      # 4. 同步 files/ 目录到 OSS 根目录
      - name: Sync files to OSS
        run: |
          ossutil sync ./files oss://cross-border-nav/ \
            --delete \
            --exclude "*.git" \
            --exclude "*.md" \
            --exclude "*.sh" \
            --exclude ".gitignore" \
            --exclude ".DS_Store" \
            --jobs 10

      # 5. HTML / CSS / JS 设置短缓存
      - name: Set Cache-Control for HTML CSS JS files
        run: |
          for ext in html css js; do
            ossutil set-meta oss://cross-border-nav/ \
              "Cache-Control:no-cache,no-store,must-revalidate" \
              --recursive \
              --include "*.${ext}" \
              --update
          done

      # 6. 图片和字体设置长缓存
      - name: Set Cache-Control for static assets
        run: |
          for ext in png jpg jpeg gif webp svg ico woff woff2 ttf eot; do
            ossutil set-meta oss://cross-border-nav/ \
              "Cache-Control:public,max-age=2592000" \
              --recursive \
              --include "*.${ext}" \
              --update
          done

      # 7. JSON 数据文件设置短缓存
      - name: Set Cache-Control for JSON files
        run: |
          ossutil set-meta oss://cross-border-nav/ \
            "Cache-Control:public,max-age=300" \
            --recursive \
            --include "*.json" \
            --update

      # 8. 部署完成输出摘要
      - name: Deployment summary
        run: |
          echo "✅ 部署成功！"
          echo "🪣 Bucket: cross-border-nav"
          echo "🌐 Endpoint: oss-cn-hangzhou.aliyuncs.com"
          echo "📦 Commit: ${{ github.sha }}"
          echo "🕐 Time: $(date '+%Y-%m-%d %H:%M:%S UTC')"
