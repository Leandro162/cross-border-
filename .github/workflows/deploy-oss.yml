name: 🚀 Deploy to Aliyun OSS + CDN

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to OSS
        uses: yunser/aliyun-oss-action@v1
        with:
          accessKeyId: ${{ secrets.ALI_OSS_ACCESS_KEY_ID }}
          accessKeySecret: ${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }}
          bucket: cross-border-nav
          region: oss-cn-hangzhou
          localPath: ./
          ossPath: /
