name: Deploy to Aliyun OSS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OSS
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install oss2

      - name: Upload files
        env:
          ID: ${{ secrets.ALI_OSS_ACCESS_KEY_ID }}
          SECRET: ${{ secrets.ALI_OSS_ACCESS_KEY_SECRET }}
        run: |
          python - << 'EOF'
import oss2, os
auth = oss2.Auth(os.getenv('ID'), os.getenv('SECRET'))
bucket = oss2.Bucket(auth, 'oss-cn-hangzhou.aliyuncs.com', 'cross-border-nav')
for root, dirs, files in os.walk('.'):
    for f in files:
        if f.endswith('.md') or '.git' in root or '.github' in root: continue
        local = os.path.join(root, f)
        oss_path = os.path.relpath(local, '.').replace('\\', '/')
        bucket.put_object_from_file(oss_path, local)
        print('Uploaded:', oss_path)
print('✅ 部署完成')
EOF
